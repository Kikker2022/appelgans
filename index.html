<!DOCTYPE html>
<html>
<head>
  <title>Appelgans Multiplayer</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>🪿 Appelgans Multiplayer</h1>
  <p id="status">Verbinden met database...</p>

  <script>
    const supabase = window.supabase.createClient(
      "https://hpawswyeaiokxdvvqubq.supabase.co",
      "supabasecode"
    );

    async function test() {
      try {
        const { error } = await supabase
          .from("test")
          .select("*")
          .limit(1);

        if (error) {
          document.getElementById("status").innerText =
            "❌ Supabase error: " + error.message;
        } else {
          document.getElementById("status").innerText =
            "✅ Verbonden met Supabase!";
        }

      } catch (e) {
        document.getElementById("status").innerText =
          "🔥 JS fout: " + e.message;
      }
    }

    test();
  </script>

</body>
</html>
