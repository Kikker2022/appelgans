<!DOCTYPE html>
<html>
<head>
  <title>Appelgans Multiplayer</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">

  <h1>🪿 Appelgans Multiplayer</h1>
  <p id="status">Verbinden met database...</p>

  <script>
    const supabaseUrl = "https://hpawswyeaiokxdvvqubq.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function testConnection() {
      try {
        const { data, error } = await supabase
          .from("test")
          .select("*")
          .limit(1);

        if (error) {
          document.getElementById("status").innerText =
            "❌ Supabase error: " + error.message;
        } else {
          document.getElementById("status").innerText =
            "✅ Verbonden met Supabase!";
        }

      } catch (err) {
        document.getElementById("status").innerText =
          "🔥 JavaScript fout: " + err.message;
      }
    }

    testConnection();
  </script>

</body>
</html>
